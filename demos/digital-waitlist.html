<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Waitlist — Carrier Pigeon AI Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --blue: #378ADD; --blue-light: #e8f0fa; --green: #3FAE5C; --green-light: #e6f6ea; --ink: #0e0e0d; --ink-2: #3a3a37; --ink-3: #7a7a74; --ink-4: #b0b0a8; --surface: #fff; --bg: #f7f6f2; --border: rgba(14,14,13,0.12); }
  body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; }
  .demo-bar { background: #0c0c0d; color: rgba(241,241,239,0.65); text-align: center; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; padding: 10px 12px; letter-spacing: 0.04em; display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #2a2a2d; }
  .demo-bar a { color: #9bff5b; text-decoration: none; font-weight: 500; }
  .demo-bar a:hover { text-decoration: underline; }
  .demo-bar .sep { color: #45453f; }
  nav { position: sticky; top: 0; z-index: 100; background: rgba(247,246,242,0.88); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 20px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
  .nav-back { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--ink-3); text-decoration: none; }
  .nav-back:hover { color: var(--ink); }
  .nav-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .nav-badge { font-size: 11px; background: var(--blue-light); color: var(--blue); padding: 3px 10px; border-radius: 99px; font-weight: 500; }
  .wrap { max-width: 880px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 12px; }
  .page-header-left { display: flex; align-items: center; gap: 10px; }
  .brand-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--blue); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .brand-icon svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  h1 { font-size: 16px; font-weight: 500; }
  .page-sub { font-size: 12px; color: var(--ink-3); }

  .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 1.5rem; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.1rem; }
  .stat-num { font-size: 24px; font-weight: 600; line-height: 1.1; }
  .stat-label { font-size: 11px; color: var(--ink-3); margin-top: 4px; }

  .columns { display: grid; grid-template-columns: 320px 1fr; gap: 1rem; align-items: start; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; }
  .section-head { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-4); margin-bottom: 0.9rem; }

  .form-group { margin-bottom: 0.85rem; }
  .form-group label { font-size: 12px; color: var(--ink-3); display: block; margin-bottom: 5px; }
  .form-group input, .form-group select { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; color: var(--ink); background: var(--surface); font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s; }
  .form-group input:focus, .form-group select:focus { border-color: var(--blue); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn-add { width: 100%; background: var(--blue); border: none; border-radius: 8px; color: #fff; padding: 10px 16px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; margin-top: 0.4rem; }
  .btn-add:hover { opacity: 0.92; }

  .queue-empty { text-align: center; padding: 3rem 1rem; color: var(--ink-3); font-size: 13px; }
  .queue-empty svg { width: 32px; height: 32px; stroke: var(--ink-4); fill: none; stroke-width: 1.5; margin-bottom: 10px; }

  .queue-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .queue-item:last-child { border-bottom: none; }
  .queue-pos { width: 30px; height: 30px; border-radius: 50%; background: var(--blue-light); color: var(--blue); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
  .queue-info { flex: 1; min-width: 0; }
  .queue-name { font-size: 13px; font-weight: 500; }
  .queue-meta { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .queue-wait { font-size: 11px; color: var(--ink-3); text-align: right; flex-shrink: 0; font-family: 'JetBrains Mono', monospace; }
  .queue-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn { width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink-3); transition: all 0.12s; }
  .icon-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .icon-btn:hover { border-color: var(--ink-3); color: var(--ink); }
  .icon-btn.notify:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-light); }
  .icon-btn.seat:hover { border-color: var(--green); color: var(--green); background: var(--green-light); }
  .icon-btn.remove:hover { border-color: #E24B4A; color: #E24B4A; background: #fdecec; }

  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(120%); background: var(--ink); color: #fff; font-size: 13px; padding: 10px 18px; border-radius: 99px; transition: transform 0.25s ease; z-index: 200; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 680px) { .columns { grid-template-columns: 1fr; } .stats-row { grid-template-columns: repeat(3, 1fr); gap: 8px; } .stat-num { font-size: 19px; } }
</style>
</head>
<body>

<div class="demo-bar"><a href="/">← All demos</a><span class="sep">|</span>Demo by <a href="https://carrierpigeonai.dev">Carrier Pigeon AI</a><span class="sep">|</span>Want this for your business? <a href="mailto:andrew@carrierpigeonai.dev">Get in touch →</a></div>

<nav>
  <a class="nav-back" href="/"><svg viewBox="0 0 14 14"><path d="M9 2L4 7l5 5"/></svg> All demos</a>
  <span class="nav-badge">Live demo</span>
</nav>

<div class="wrap">
  <div class="page-header">
    <div class="page-header-left">
      <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
      <div><h1>Digital waitlist</h1><div class="page-sub">Add walk-ins, track wait times, notify when ready</div></div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="stat-waiting">0</div><div class="stat-label">Waiting now</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-wait">—</div><div class="stat-label">Est. wait (next)</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-seated">0</div><div class="stat-label">Seated today</div></div>
  </div>

  <div class="columns">
    <div class="card">
      <div class="section-head">Add to waitlist</div>
      <div class="form-group"><label>Name</label><input type="text" id="in-name" placeholder="e.g. Marcus T."></div>
      <div class="two-col">
        <div class="form-group"><label>Party size</label><input type="number" id="in-size" min="1" value="2"></div>
        <div class="form-group"><label>Phone (optional)</label><input type="text" id="in-phone" placeholder="(337) 555-0100"></div>
      </div>
      <button class="btn-add" onclick="addToQueue()">Add to waitlist</button>
    </div>

    <div class="card">
      <div class="section-head">Current queue</div>
      <div id="queue-list"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let queue = [
  { name: 'Jenna R.', size: 4, phone: '(337) 555-0148', addedAt: Date.now() - 18*60000 },
  { name: 'The Boudreaux Party', size: 6, phone: '', addedAt: Date.now() - 9*60000 },
  { name: 'Marcus T.', size: 2, phone: '(337) 555-0172', addedAt: Date.now() - 3*60000 },
];
let seatedToday = 12;
const MIN_PER_PARTY = 12; // avg minutes added to wait per party ahead

function fmtWait(mins){
  if(mins <= 0) return 'Ready now';
  if(mins < 60) return `~${mins} min`;
  return `~${Math.floor(mins/60)}h ${mins%60}m`;
}

function timeAgo(ts){
  const mins = Math.floor((Date.now()-ts)/60000);
  if(mins < 1) return 'just now';
  if(mins === 1) return '1 min ago';
  return `${mins} min ago`;
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 2400);
}

function render(){
  const list = document.getElementById('queue-list');
  list.innerHTML = '';
  if(queue.length === 0){
    list.innerHTML = `<div class="queue-empty"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg><div>No one's waiting — queue is clear.</div></div>`;
  } else {
    queue.forEach((item, idx) => {
      const wait = idx * MIN_PER_PARTY;
      const row = document.createElement('div');
      row.className = 'queue-item';
      row.innerHTML = `
        <div class="queue-pos">${idx+1}</div>
        <div class="queue-info">
          <div class="queue-name">${item.name}</div>
          <div class="queue-meta">Party of ${item.size}${item.phone ? ' · ' + item.phone : ''} · added ${timeAgo(item.addedAt)}</div>
        </div>
        <div class="queue-wait">${fmtWait(wait)}</div>
        <div class="queue-actions">
          <button class="icon-btn notify" title="Text: table ready" onclick="notify(${idx})"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></button>
          <button class="icon-btn seat" title="Seat party" onclick="seat(${idx})"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></button>
          <button class="icon-btn remove" title="Remove" onclick="remove(${idx})"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>`;
      list.appendChild(row);
    });
  }
  document.getElementById('stat-waiting').textContent = queue.length;
  document.getElementById('stat-wait').textContent = queue.length ? fmtWait(0) : '—';
  document.getElementById('stat-seated').textContent = seatedToday;
}

function addToQueue(){
  const name = document.getElementById('in-name').value.trim();
  const size = parseInt(document.getElementById('in-size').value) || 1;
  const phone = document.getElementById('in-phone').value.trim();
  if(!name){ document.getElementById('in-name').focus(); return; }
  queue.push({ name, size, phone, addedAt: Date.now() });
  document.getElementById('in-name').value = '';
  document.getElementById('in-phone').value = '';
  document.getElementById('in-size').value = 2;
  render();
  showToast(`Added ${name} to the waitlist`);
}

function notify(idx){
  const item = queue[idx];
  showToast(item.phone ? `Texted ${item.name}: "Your table is ready!"` : `${item.name}: table ready (no phone on file)`);
}

function seat(idx){
  const item = queue[idx];
  queue.splice(idx, 1);
  seatedToday++;
  render();
  showToast(`Seated ${item.name} — enjoy!`);
}

function remove(idx){
  const item = queue[idx];
  queue.splice(idx, 1);
  render();
  showToast(`Removed ${item.name} from the waitlist`);
}

render();
</script>
</body>
</html>
