<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open Today? — Carrier Pigeon AI Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --amber: #EF9F27; --amber-light: #faeeda; --ink: #0e0e0d; --ink-2: #3a3a37; --ink-3: #7a7a74; --ink-4: #b0b0a8; --surface: #fff; --bg: #f7f6f2; --border: rgba(14,14,13,0.12); --green: #16a34a; --red: #dc2626; }
  body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--ink); -webkit-font-smoothing: antialiased; }
  .demo-bar { background: #0c0c0d; color: rgba(241,241,239,0.65); text-align: center; font-family: 'JetBrains Mono', ui-monospace, monospace; font-size: 11px; padding: 10px 12px; letter-spacing: 0.04em; display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; border-bottom: 1px solid #2a2a2d; }
  .demo-bar a { color: #9bff5b; text-decoration: none; font-weight: 500; }
  .demo-bar a:hover { text-decoration: underline; }
  .demo-bar .sep { color: #45453f; }
  nav { position: sticky; top: 0; z-index: 100; background: rgba(247,246,242,0.88); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 20px; height: 52px; display: flex; align-items: center; justify-content: space-between; }
  .nav-back { display: flex; align-items: center; gap: 7px; font-size: 13px; color: var(--ink-3); text-decoration: none; }
  .nav-back:hover { color: var(--ink); }
  .nav-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .nav-badge { font-size: 11px; background: var(--amber-light); color: #854F0B; padding: 3px 10px; border-radius: 99px; font-weight: 500; }
  .wrap { max-width: 560px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
  .tabs { display: flex; gap: 4px; background: rgba(14,14,13,0.06); padding: 4px; border-radius: 10px; margin-bottom: 1.75rem; }
  .tab { flex: 1; padding: 8px; border: none; border-radius: 7px; font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer; background: transparent; color: var(--ink-3); transition: all 0.15s; }
  .tab.active { background: var(--surface); color: var(--ink); font-weight: 500; border: 1px solid var(--border); }
  .panel { display: none; }
  .panel.active { display: block; }
  .section-head { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-4); margin: 1.25rem 0 0.75rem; }
  .form-group { margin-bottom: 1rem; }
  .form-group label { font-size: 12px; color: var(--ink-3); display: block; margin-bottom: 5px; }
  .form-group input, .form-group textarea { width: 100%; padding: 9px 11px; border: 1px solid var(--border); border-radius: 7px; font-size: 13px; color: var(--ink); background: var(--surface); font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.15s; }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--amber); }
  .form-group textarea { resize: none; height: 56px; }
  .hours-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; }
  .hours-row .day-label { width: 80px; font-weight: 500; flex-shrink: 0; }
  .hours-row input[type=time] { flex: 1; padding: 6px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; color: var(--ink); background: var(--surface); font-family: 'Inter', sans-serif; outline: none; }
  .hours-row input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--amber); }
  .hours-row .to { color: var(--ink-4); font-size: 12px; flex-shrink: 0; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }
  .btn-primary { background: var(--ink); border: none; border-radius: 8px; color: #fff; padding: 10px 20px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; display: inline-flex; align-items: center; gap: 6px; }
  .btn-primary:hover { opacity: 0.82; }
  .btn-primary svg { width: 14px; height: 14px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .preview-card { border: 1px solid var(--border); border-radius: 16px; overflow: hidden; background: var(--surface); }
  .preview-hero { padding: 2rem 1.5rem 1.5rem; text-align: center; }
  .biz-avatar { width: 56px; height: 56px; border-radius: 14px; background: var(--amber); display: flex; align-items: center; justify-content: center; margin: 0 auto 0.75rem; }
  .biz-avatar svg { width: 26px; height: 26px; stroke: #fff; fill: none; stroke-width: 1.75; stroke-linecap: round; stroke-linejoin: round; }
  .biz-title { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .biz-tagline { font-size: 13px; color: var(--ink-3); }
  .status-pill { display: inline-flex; align-items: center; gap: 7px; padding: 8px 18px; border-radius: 99px; font-size: 14px; font-weight: 500; margin: 1rem 0 0.25rem; }
  .status-pill.open { background: #dcfce7; color: #166534; }
  .status-pill.closed { background: #fee2e2; color: #991b1b; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .open .status-dot { background: var(--green); }
  .closed .status-dot { background: var(--red); }
  .status-sub { font-size: 13px; color: var(--ink-3); }
  .preview-divider { border: none; border-top: 1px solid var(--border); }
  .hours-list { padding: 1rem 1.5rem; }
  .hours-list-row { display: flex; justify-content: space-between; padding: 7px 0; font-size: 13px; border-bottom: 1px solid rgba(14,14,13,0.06); }
  .hours-list-row:last-child { border-bottom: none; }
  .hours-list-row .day { color: var(--ink-3); }
  .hours-list-row .time { color: var(--ink); font-weight: 500; }
  .hours-list-row.today-row .day { color: var(--amber); font-weight: 500; }
  .hours-list-row.today-row .time { color: #854F0B; }
  .special-band { background: var(--amber-light); padding: 0.875rem 1.5rem; border-top: 1px solid rgba(14,14,13,0.06); font-size: 13px; color: #633806; display: flex; align-items: flex-start; gap: 8px; }
  .special-band svg { width: 15px; height: 15px; stroke: var(--amber); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; margin-top: 1px; }
  .share-bar { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .share-url { flex: 1; font-size: 12px; color: var(--ink-4); background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; font-family: monospace; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  .copy-btn { background: none; border: 1px solid var(--border); border-radius: 7px; padding: 7px 12px; font-size: 12px; cursor: pointer; color: var(--ink-3); font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 5px; white-space: nowrap; }
  .copy-btn:hover { background: var(--bg); }
  .copy-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<div class="demo-bar"><a href="/">← All demos</a><span class="sep">|</span>Demo by <a href="https://carrierpigeonai.dev">Carrier Pigeon AI</a><span class="sep">|</span>Want this for your business? <a href="mailto:andrew@carrierpigeonai.dev">Get in touch →</a></div>

<nav>
  <a class="nav-back" href="/"><svg viewBox="0 0 14 14"><path d="M9 2L4 7l5 5"/></svg> All demos</a>
  <span class="nav-badge">Live demo</span>
</nav>

<div class="wrap">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('editor')">Edit info</button>
    <button class="tab" onclick="switchTab('preview')">Live preview</button>
  </div>

  <div class="panel active" id="panel-editor">
    <div class="section-head">Business info</div>
    <div class="form-group"><label>Business name</label><input type="text" id="e-name" value="Sunrise Hair Studio" oninput="updatePreview()"></div>
    <div class="form-group"><label>Short tagline</label><input type="text" id="e-tag" value="Walk-ins welcome · Lafayette, LA" oninput="updatePreview()"></div>
    <div class="form-group"><label>Today's special (leave blank to hide)</label><textarea id="e-special" oninput="updatePreview()">Free deep conditioner with any color service today only!</textarea></div>
    <div class="divider"></div>
    <div class="section-head">Weekly hours</div>
    <div id="hours-editor"></div>
    <div class="divider"></div>
    <button class="btn-primary" onclick="switchTab('preview')"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>See live preview</button>
  </div>

  <div class="panel" id="panel-preview">
    <div class="preview-card" id="preview-card"></div>
  </div>
</div>

<script>
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const DEFAULT_HOURS=[{open:false,from:'09:00',to:'17:00'},{open:true,from:'09:00',to:'18:00'},{open:true,from:'09:00',to:'18:00'},{open:true,from:'09:00',to:'18:00'},{open:true,from:'09:00',to:'18:00'},{open:true,from:'09:00',to:'18:00'},{open:true,from:'10:00',to:'16:00'}];
let hours=DEFAULT_HOURS.map(h=>({...h}));
function buildEditor(){const el=document.getElementById('hours-editor');el.innerHTML='';hours.forEach((h,i)=>{const row=document.createElement('div');row.className='hours-row';row.innerHTML=`<span class="day-label">${DAYS[i].slice(0,3)}</span><input type="checkbox" id="chk-${i}" ${h.open?'checked':''} onchange="hours[${i}].open=this.checked;updatePreview();document.getElementById('from-${i}').disabled=!this.checked;document.getElementById('to-${i}').disabled=!this.checked;"><input type="time" value="${h.from}" ${!h.open?'disabled':''} id="from-${i}" onchange="hours[${i}].from=this.value;updatePreview();"><span class="to">to</span><input type="time" value="${h.to}" ${!h.open?'disabled':''} id="to-${i}" onchange="hours[${i}].to=this.value;updatePreview();">`;el.appendChild(row);});}
function fmtTime(t){const [h,m]=t.split(':').map(Number);const ampm=h>=12?'PM':'AM';return`${h%12||12}:${String(m).padStart(2,'0')} ${ampm}`;}
function isOpenNow(h){if(!h.open)return false;const now=new Date();const cur=now.getHours()*60+now.getMinutes();const [fh,fm]=h.from.split(':').map(Number);const [th,tm]=h.to.split(':').map(Number);return cur>=fh*60+fm&&cur<th*60+tm;}
function updatePreview(){
  const name=document.getElementById('e-name').value||'My Business';
  const tag=document.getElementById('e-tag').value||'';
  const special=document.getElementById('e-special').value||'';
  const tidx=new Date().getDay();const todayH=hours[tidx];const open=isOpenNow(todayH);
  let statusText='';
  if(!todayH.open)statusText='Closed today';
  else if(open)statusText='Open now · closes '+fmtTime(todayH.to);
  else{const now=new Date();const cur=now.getHours()*60+now.getMinutes();const [fh,fm]=todayH.from.split(':').map(Number);if(cur<fh*60+fm)statusText='Opens today at '+fmtTime(todayH.from);else statusText='Closed for today · opens '+DAYS[(tidx+1)%7];}
  let hoursRows='';hours.forEach((h,i)=>{const isToday=i===tidx;hoursRows+=`<div class="hours-list-row ${isToday?'today-row':''}"><span class="day">${DAYS[i]}</span><span class="time">${h.open?fmtTime(h.from)+' – '+fmtTime(h.to):'Closed'}</span></div>`;});
  const specialBand=special?`<div class="special-band"><svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg><span>${special}</span></div>`:'';
  const pillClass=(open&&todayH.open)?'open':'closed';const pillText=(open&&todayH.open)?'Open now':'Closed';
  document.getElementById('preview-card').innerHTML=`<div class="preview-hero"><div class="biz-avatar"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div><div class="biz-title">${name}</div><div class="biz-tagline">${tag}</div><div class="status-pill ${pillClass}"><span class="status-dot"></span>${pillText}</div><div class="status-sub">${statusText}</div></div>${specialBand}<div class="preview-divider"></div><div class="hours-list">${hoursRows}</div><div class="share-bar"><div class="share-url">sunrise-hair.mysite.com/hours</div><button class="copy-btn" onclick="copyLink()"><svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy link</button></div>`;
}
function copyLink(){navigator.clipboard.writeText('sunrise-hair.mysite.com/hours').catch(()=>{});const btn=document.querySelector('.copy-btn');if(btn){btn.textContent='Copied!';setTimeout(()=>{btn.innerHTML='<svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy link';},1800);}}
function switchTab(name){document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&name==='editor')||(i===1&&name==='preview')));document.getElementById('panel-editor').classList.toggle('active',name==='editor');document.getElementById('panel-preview').classList.toggle('active',name==='preview');if(name==='preview')updatePreview();}
buildEditor();updatePreview();
</script>
</body>
</html>
